<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a4d2c" />
    <title>Studus Pós UNIFIP - Administração</title>
    
    <!-- PWA Manifest support -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS / Safari Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="UNIFIP" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/000000/university.png" />
    
    <!-- Microsoft / Windows PC Tile integration -->
    <meta name="msapplication-TileColor" content="#0a4d2c" />
    <meta name="msapplication-TileImage" content="https://img.icons8.com/color/192/000000/university.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register a simple service worker to allow offline loading shell and install prompt in iOS, Android, and PC browsers -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
